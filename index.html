<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>App de Clima</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css

    <!-- CSS compilado desde SASS -->
    css/main.css
</head>

<body class="weather-app">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">Weather App</span>
        </div>
    </nav>

    <main class="container my-4 weather-app__content">
        <div class="row">

            <div class="col-12 col-md-6 col-lg-4">
                <div class="place-card place-card--sunny">
                    <h3 class="place-card__name">Santiago</h3>
                    <p class="place-card__temp">22°C</p>
                    <p class="place-card__status">Soleado</p>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="place-card place-card--cloudy">
                    <h3 class="place-card__name">Valparaíso</h3>
                    <p class="place-card__temp">18°C</p>
                    <p class="place-card__status">Nublado</p>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="place-card place-card--rainy">
                    <h3 class="place-card__name">Concepción</h3>
                    <p class="place-card__temp">16°C</p>
                    <p class="place-card__status">Lluvia</p>
                </div>
            </div>

        </div>
    </main>

    <footer class="weather-app__footer text-center p-3">
        © 2026 — App de Clima Módulo 3
    </footer>

    https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js
</body>

</html>
